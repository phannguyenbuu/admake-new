  <text x="1080" y="1088" class="small">Luồng khuyến nghị: Master data -> Document Center / Task -> Inventory / AR / AP / Cash / Payroll / Fixed Assets -> Journal -> Reports</text>
  <text x="1080" y="1112" class="small">Luồng gạch đứt: liên kết mềm bằng AccountingLink và traceability hai chiều</text>
