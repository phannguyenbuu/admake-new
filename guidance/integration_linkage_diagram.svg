<?xml version="1.0" encoding="UTF-8"?>
<svg width="1800" height="1180" viewBox="0 0 1800 1180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f8fb"/>
      <stop offset="100%" stop-color="#eef3f7"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4b5f7a"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #13324b; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #4e647c; }
      .section { font: 700 20px Arial, sans-serif; fill: #17324d; }
      .box-title { font: 700 18px Arial, sans-serif; fill: #17324d; }
      .box-text { font: 400 15px Arial, sans-serif; fill: #38516a; }
      .small { font: 400 14px Arial, sans-serif; fill: #526a81; }
      .line { stroke: #4b5f7a; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 6; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="1180" fill="url(#bg)"/>

  <text x="60" y="64" class="title">Sơ Đồ Liên Kết Module Trong Hệ Thống</text>
  <text x="60" y="96" class="subtitle">Trục chính: Master data - Chứng từ/Task - Nghiệp vụ vận hành - Hạch toán - Báo cáo đối chiếu</text>

  <rect x="40" y="130" width="320" height="950" rx="24" fill="#e8f2f9" stroke="#bad2e3"/>
  <text x="70" y="175" class="section">1. Master Data</text>

  <rect x="70" y="205" width="260" height="110" rx="18" fill="#ffffff" stroke="#9fc0d7"/>
  <text x="92" y="238" class="box-title">Khách hàng / NCC</text>
  <text x="92" y="266" class="box-text">customer</text>
  <text x="92" y="288" class="box-text">supplier</text>

  <rect x="70" y="340" width="260" height="110" rx="18" fill="#ffffff" stroke="#9fc0d7"/>
  <text x="92" y="373" class="box-title">Nhân sự</text>
  <text x="92" y="401" class="box-text">user</text>
  <text x="92" y="423" class="box-text">role / bộ phận</text>

  <rect x="70" y="475" width="260" height="140" rx="18" fill="#ffffff" stroke="#9fc0d7"/>
  <text x="92" y="508" class="box-title">Task / Công trình</text>
  <text x="92" y="536" class="box-text">task</text>
  <text x="92" y="558" class="box-text">workspace = project hiện tại</text>
  <text x="92" y="580" class="box-text">nơi tập hợp chi phí trực tiếp</text>

  <rect x="70" y="640" width="260" height="170" rx="18" fill="#ffffff" stroke="#9fc0d7"/>
  <text x="92" y="673" class="box-title">Danh mục kho</text>
  <text x="92" y="701" class="box-text">inventory_items</text>
  <text x="92" y="723" class="box-text">item_categories</text>
  <text x="92" y="745" class="box-text">warehouses</text>
  <text x="92" y="767" class="box-text">inventory_account_mappings</text>

  <rect x="70" y="835" width="260" height="120" rx="18" fill="#ffffff" stroke="#9fc0d7"/>
  <text x="92" y="868" class="box-title">Danh mục kế toán</text>
  <text x="92" y="896" class="box-text">chart_of_accounts</text>
  <text x="92" y="918" class="box-text">tax_codes / periods</text>

  <rect x="400" y="130" width="480" height="950" rx="24" fill="#eef8ee" stroke="#bddbbd"/>
  <text x="430" y="175" class="section">2. Chứng Từ Gốc Và Điều Phối Nghiệp Vụ</text>

  <rect x="435" y="210" width="410" height="170" rx="18" fill="#ffffff" stroke="#a6d3ad"/>
  <text x="458" y="244" class="box-title">Document Center</text>
  <text x="458" y="272" class="box-text">document_center_document</text>
  <text x="458" y="294" class="box-text">Hợp đồng / PO / Invoice / Delivery / Handover / Acceptance</text>
  <text x="458" y="316" class="box-text">chứng từ gốc để neo liên kết</text>
  <text x="458" y="338" class="box-text">workflow: draft - submitted - approved - paid - closed</text>

  <rect x="435" y="410" width="195" height="130" rx="18" fill="#ffffff" stroke="#a6d3ad"/>
  <text x="457" y="444" class="box-title">Payroll Summary</text>
  <text x="457" y="472" class="box-text">workpoint + message</text>
  <text x="457" y="494" class="box-text">+ task reward</text>
  <text x="457" y="516" class="box-text">chuẩn bị thành payroll batch</text>

  <rect x="650" y="410" width="195" height="130" rx="18" fill="#ffffff" stroke="#a6d3ad"/>
  <text x="672" y="444" class="box-title">Task / Project Hub</text>
  <text x="672" y="472" class="box-text">taskId / projectId</text>
  <text x="672" y="494" class="box-text">gắn vật tư, hồ sơ, AR</text>
  <text x="672" y="516" class="box-text">và thanh toán</text>

  <rect x="435" y="575" width="410" height="210" rx="18" fill="#ffffff" stroke="#a6d3ad"/>
  <text x="458" y="609" class="box-title">Nguyên tắc điều phối</text>
  <text x="458" y="637" class="box-text">- Chứng từ là đầu vào hoặc điểm neo link</text>
  <text x="458" y="659" class="box-text">- Task/công trình là nơi gom chi phí và doanh thu</text>
  <text x="458" y="681" class="box-text">- Mỗi nghiệp vụ phải truy được source_type/source_id</text>
  <text x="458" y="703" class="box-text">- AccountingLink dùng cho truy vết mềm hai chiều</text>
  <text x="458" y="725" class="box-text">- FK trực tiếp dùng cho quan hệ rõ ràng</text>
  <text x="458" y="747" class="box-text">- Inventory mới là nguồn dữ liệu kho chuẩn</text>

  <rect x="435" y="820" width="410" height="170" rx="18" fill="#ffffff" stroke="#a6d3ad"/>
  <text x="458" y="854" class="box-title">Materials Legacy</text>
  <text x="458" y="882" class="box-text">materials / material_transaction</text>
  <text x="458" y="904" class="box-text">giữ cho UI cũ / preview / compatibility</text>
  <text x="458" y="926" class="box-text">không nên là nguồn ghi nhận tồn kho chuẩn mới</text>
  <text x="458" y="948" class="box-text">nên đọc từ inventory nếu cần tương thích</text>

  <rect x="920" y="130" width="390" height="950" rx="24" fill="#fff6ea" stroke="#e3c79d"/>
  <text x="950" y="175" class="section">3. Nghiệp Vụ Vận Hành</text>

  <rect x="950" y="210" width="330" height="150" rx="18" fill="#ffffff" stroke="#e0bc88"/>
  <text x="972" y="244" class="box-title">Accounts Receivable</text>
  <text x="972" y="272" class="box-text">AR invoice</text>
  <text x="972" y="294" class="box-text">thu từ khách nhiều đợt</text>
  <text x="972" y="316" class="box-text">aging / statement / payment history</text>

  <rect x="950" y="390" width="330" height="150" rx="18" fill="#ffffff" stroke="#e0bc88"/>
  <text x="972" y="424" class="box-title">Accounts Payable</text>
  <text x="972" y="452" class="box-text">AP bill</text>
  <text x="972" y="474" class="box-text">thanh toán NCC nhiều đợt</text>
  <text x="972" y="496" class="box-text">aging / statement / payment history</text>

  <rect x="950" y="570" width="330" height="170" rx="18" fill="#ffffff" stroke="#e0bc88"/>
  <text x="972" y="604" class="box-title">Inventory</text>
  <text x="972" y="632" class="box-text">stock_transactions</text>
  <text x="972" y="654" class="box-text">inventory_balances</text>
  <text x="972" y="676" class="box-text">moving average cost</text>
  <text x="972" y="698" class="box-text">purchase_receipt / task_issue / sales_issue</text>

  <rect x="950" y="770" width="330" height="140" rx="18" fill="#ffffff" stroke="#e0bc88"/>
  <text x="972" y="804" class="box-title">Daily Cash</text>
  <text x="972" y="832" class="box-text">accounting_daily_cash</text>
  <text x="972" y="854" class="box-text">dòng tiền thực tế</text>
  <text x="972" y="876" class="box-text">phiếu thu / phiếu chi / tài khoản tiền</text>

  <rect x="950" y="940" width="330" height="110" rx="18" fill="#ffffff" stroke="#e0bc88"/>
  <text x="972" y="974" class="box-title">Fixed Assets</text>
  <text x="972" y="1002" class="box-text">fixed_assets / depreciations</text>
  <text x="972" y="1024" class="box-text">nguồn từ document mua tài sản</text>

  <rect x="1360" y="130" width="390" height="950" rx="24" fill="#f4efff" stroke="#cabcf0"/>
  <text x="1390" y="175" class="section">4. Kế Toán Và Đối Chiếu</text>

  <rect x="1390" y="210" width="330" height="180" rx="18" fill="#ffffff" stroke="#b5a4e6"/>
  <text x="1412" y="244" class="box-title">Journal Entries</text>
  <text x="1412" y="272" class="box-text">journal_entries</text>
  <text x="1412" y="294" class="box-text">journal_entry_lines</text>
  <text x="1412" y="316" class="box-text">source_type / source_id</text>
  <text x="1412" y="338" class="box-text">reference_no / posted / reversed</text>
  <text x="1412" y="360" class="box-text">sổ nhật ký - sổ cái - trial balance</text>

  <rect x="1390" y="425" width="330" height="150" rx="18" fill="#ffffff" stroke="#b5a4e6"/>
  <text x="1412" y="459" class="box-title">AccountingLink</text>
  <text x="1412" y="487" class="box-text">source_type / source_id</text>
  <text x="1412" y="509" class="box-text">target_type / target_id</text>
  <text x="1412" y="531" class="box-text">truy vết mềm hai chiều</text>
  <text x="1412" y="553" class="box-text">document - stock - AR/AP - cash - journal</text>

  <rect x="1390" y="610" width="330" height="160" rx="18" fill="#ffffff" stroke="#b5a4e6"/>
  <text x="1412" y="644" class="box-title">Thuế Và Kỳ Kế Toán</text>
  <text x="1412" y="672" class="box-text">tax_codes</text>
  <text x="1412" y="694" class="box-text">accounting_periods</text>
  <text x="1412" y="716" class="box-text">VAT input / VAT output</text>
  <text x="1412" y="738" class="box-text">khóa kỳ và báo cáo theo kỳ</text>

  <rect x="1390" y="805" width="330" height="210" rx="18" fill="#ffffff" stroke="#b5a4e6"/>
  <text x="1412" y="839" class="box-title">Báo cáo và đối chiếu</text>
  <text x="1412" y="867" class="box-text">- Công nợ phải thu / phải trả</text>
  <text x="1412" y="889" class="box-text">- Nhật ký chung / sổ cái</text>
  <text x="1412" y="911" class="box-text">- Cân đối phát sinh</text>
  <text x="1412" y="933" class="box-text">- Lãi lỗ / cân đối kế toán / dòng tiền</text>
  <text x="1412" y="955" class="box-text">- Đối chiếu tồn kho với 152/155/156</text>
  <text x="1412" y="977" class="box-text">- Đối chiếu payroll với 334</text>

