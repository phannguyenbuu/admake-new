name: Build Admake APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Create Flutter Project
        run: |
          mkdir build_dir
          cd build_dir
          flutter create --org com.admake --project-name admake_app .
          # Modify AndroidManifest.xml for required permissions
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>' android/app/src/main/AndroidManifest.xml
          # Add compileSdk and minSdk adjustments if needed
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/g' android/app/build.gradle
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' android/app/build.gradle

      - name: Replace source code
        run: |
          cp -r lib/* build_dir/lib/
          cp pubspec.yaml build_dir/pubspec.yaml

      - name: Build APK (Release)
        run: |
          cd build_dir
          flutter pub get
          flutter build apk --release

      - name: Upload APK Release
        uses: actions/upload-artifact@v3
        with:
          name: Admake-App-Release.apk
          path: build_dir/build/app/outputs/flutter-apk/app-release.apk
